<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Clo — personal site</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="site-page page-home" data-page="home">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Clo home">Clo <span>✿</span></a>
      <nav class="site-nav" aria-label="主导航">
        <a class="is-active" href="about.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="projects.html#thinking">Thinking</a>
        <a href="contact.html">Contact</a>
        <button class="theme-button" type="button" aria-label="切换夜猫子模式">◉</button>
      </nav>
    </header>

    <main>
      <section class="hero-section surface-section" data-ripple-area aria-label="Clover Hero">
        <div class="watercolor-wash" aria-hidden="true"></div>
        <img class="hero-watercolor" src="assets/hero-watercolor.png" alt="水彩高原、女孩、水獭和猫" />
        <div class="ripple-layer" aria-hidden="true"></div>
        <div class="fluid-hello" aria-hidden="true">
          <svg class="fluid-hello-svg" viewBox="0 0 900 300" role="presentation">
            <defs>
              <linearGradient id="fluid-fill" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#739cff" />
                <stop offset=".45" stop-color="#c6a9ff" />
                <stop offset="1" stop-color="#9edfe8" />
              </linearGradient>
              <filter id="fluid-filter" x="-20%" y="-40%" width="140%" height="190%">
                <feTurbulence class="fluid-noise" type="fractalNoise" baseFrequency=".006 .018" numOctaves="3" seed="12" result="noise" />
                <feDisplacementMap class="fluid-map" in="SourceGraphic" in2="noise" scale="18" xChannelSelector="R" yChannelSelector="G" />
                <feGaussianBlur stdDeviation=".45" />
              </filter>
              <filter id="foam-glow" x="-25%" y="-40%" width="150%" height="190%">
                <feGaussianBlur stdDeviation="8" result="glow" />
                <feMerge><feMergeNode in="glow" /><feMergeNode in="SourceGraphic" /></feMerge>
              </filter>
            </defs>
            <text class="fluid-text fluid-shadow" x="50%" y="67%" text-anchor="middle" filter="url(#foam-glow)">hello</text>
            <text class="fluid-text" x="50%" y="67%" text-anchor="middle" filter="url(#fluid-filter)">hello</text>
          </svg>
        </div>
        <div class="hero-copy">
          <span>Hi,</span>
          <span>I'm Clover.</span>
        </div>
        <button class="scroll-marker" type="button" data-scroll-next aria-label="向下滚动">SCROLL ↓</button>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
