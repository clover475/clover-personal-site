<!doctype html>
<html lang="zh-CN">

    <meta charset="UTF-8" />

    <title>Contact — Clo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="site-page page-contact" data-page="contact">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Clo home">Clo <span>✿</span></a>
      <nav class="site-nav" aria-label="主导航">

    <main class="contact-main surface-section" data-ripple-area>
      <img class="contact-lake" src="assets/contact-lake.png" alt="水彩湖面、水獭和猫" />
      <button class="animal-hotspot animal-otter" type="button" aria-label="水獭小彩蛋"><span>·</span></button>

      <section class="contact-content" aria-labelledby="contact-title">
        <h1 id="contact-title">Let's build<br />something <span class="kind-word">kind</span>.</h1>

          <a class="contact-action" href="mailto:hello@cloverli.com"><span>✉</span> Email <b>→</b></a>
          <a class="contact-action" href="https://github.com/clover475" target="_blank" rel="noreferrer"><span>◉</span> GitHub <b>→</b></a>

        </div>
        <p class="contact-caption">点击湖面或空白处，让水面回应一下。</p>
      </section>
    </main>
    <script src="app.js"></script>
